services:
  - type: web
    name: entrysafe-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENV
        value: production
